baseURL = "https://rkmr-00.github.io/blog/"
locale = "ja"
title = "GadgetReviewLab"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
paginate = 10

[params]
  env = "production"
  title = "GadgetReviewLab"
  description = "スマホ・PC・家電を実際に使ってレビュー。最新ガジェットのおすすめランキングや比較記事で、後悔しない買い物をサポートします。"
  keywords = ["ガジェット", "家電", "レビュー", "おすすめ", "比較", "ランキング"]
  author = "ガジェットラボ編集部"
  DateFormat = "2006年1月2日"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  UseHugoToc = true
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "迷わず選べる。後悔しない買い物を。"
    Content = "**本当に買うべき商品**を見つけるための専門メディア。スマホ・PC・イヤホン・家電など30カテゴリ以上を実際に検証・徹底比較しています。\n\n🏆 **34記事・30製品以上**を徹底比較　|　📅 **毎月最新情報**に更新　|　✅ 編集部が実際に検証\n\n[🏆 今週の人気ランキングを確認する →](/blog/posts/wireless-earphone-ranking/)"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[menu]
  [[menu.main]]
    identifier = "ranking"
    name = "ランキング"
    url = "/categories/ranking/"
    weight = 10
  [[menu.main]]
    identifier = "comparison"
    name = "比較"
    url = "/categories/comparison/"
    weight = 30
  [[menu.main]]
    identifier = "guide"
    name = "購入ガイド"
    url = "/categories/guide/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "このブログについて"
    url = "/about/"
    weight = 50
  [[menu.main]]
    identifier = "privacy"
    name = "プライバシーポリシー"
    url = "/privacy/"
    weight = 60

# Google Analytics: G-XXXXXXXXXXを取得後に以下のコメントを外す
# [services]
#   [services.googleAnalytics]
#     ID = "G-XXXXXXXXXX"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
